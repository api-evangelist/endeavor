aid: endeavor
name: Endeavor
description: >-
  Endeavor was a global sports and entertainment company representing talent
  and owning and operating events, with subsidiaries including WME, IMG, and
  UFC. Following the 2024 take-private transaction by Silver Lake and the
  separation of TKO Group Holdings (UFC and WWE), the remaining talent, media,
  marketing, and licensing businesses were rebranded as WME Group. This
  repository tracks Endeavor as a corporate entity; no public developer APIs
  are currently published.
